secretManager:
  backend: onepassword
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key

postgres:
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD

slackbot:
  enabled: true
  image:
    pullPolicy: IfNotPresent

api:
  image:
    pullPolicy: IfNotPresent
  executionWorkerEnabled: true
  pluginWatcherEnabled: true
  egressDiscovery:
    enabled: false

ironProxy:
  image:
    pullPolicy: IfNotPresent
  manager:
    secretSource: onepassword

chatbot:
  image:
    pullPolicy: IfNotPresent

tokenBroker:
  enabled: false

sandbox:
  image:
    pullPolicy: IfNotPresent

# Run the tool-server sidecar by default in dev so local clusters mirror
# production sandbox topology.
toolServer:
  enabled: true
laminar:
  enabled: true
  appServer:
    service:
      httpPort: 8000
      grpcPort: 8001

networkPolicy:
  enabled: false
