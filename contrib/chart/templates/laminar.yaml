{{- if .Values.laminar.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse-config") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-clickhouse") | nindent 4 }}
data:
  lmnr.xml: |
    <clickhouse>
      <profiles>
        <default>
          <async_insert>1</async_insert>
          <wait_for_async_insert>1</wait_for_async_insert>
        </default>
      </profiles>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-postgres") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
