nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []

secretManager:
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key
  ca:
    certPem: ""
    keyPem: ""

ironProxy:
  image:
    repository: centaur-iron-proxy
    tag: latest
    pullPolicy: Always
  service:
    proxyPort: 8080
    managementPort: 9092
    healthPort: 9090
    # Postgres listener ports. iron-proxy allocates one listener per pg_dsn
    # secret, starting at pgPortRangeStart and incrementing. NetworkPolicies
    # allow the whole range so callers can reach any listener.
    pgPortRangeStart: 5432
    pgPortRangeEnd: 5471
  secretSource: onepassword
  secretTtl: 10m

# Tool-server sidecar — runs alongside the sandbox container in each sandbox
# Pod and exposes the same /tools/* surface the API used to. Same image as
# the API; the sidecar runs uvicorn against api.tool_server_app.
# When toolServer.enabled is false (default), the sandbox pod has no
# sidecar — currently the API still serves /tools so this is a no-op
# until the API drops its router (Phase 5).
toolServer:
  enabled: true
  port: 8001

# iron-token-broker — race-free OAuth refresh-token coordinator. Enable when
# any tool's `oauth_token` secret uses `grant=refresh_token` against an IdP
# that rotates refresh tokens with strict reuse detection (OpenAI Codex,
# Anthropic Claude Code OAuth). Requires ironProxy.secretSource to be a
# writable backend (onepassword or onepassword-connect) because the broker
# rewrites the refresh-token blob on every rotation.
tokenBroker:
  enabled: false
  image:
    repository: ironsh/iron-token-broker
    tag: 0.0.1-rc.2
    pullPolicy: IfNotPresent
  service:
    httpPort: 8181
    metricsPort: 9091
  # iron-proxy caches each broker-issued access token for this long before
  # re-fetching. Must be strictly less than the IdP's token lifetime or the
  # broker resolver rejects the response.
  ttl: 1m
  resources: {}

# iron-control — Rails control plane for authenticated API access + encrypted
# secret storage. Off by default; enable per-environment. Uses a dedicated
# `iron_control_production` database on the bundled Postgres (its own logical DB so its
# Rails schema_migrations table never collides with the API's dbmate table); an
# init container creates the DB idempotently. DATABASE_URL, bootstrap
# user/API-key, and the three ActiveRecord encryption keys are injected from the
# shared infra Secret. Point IRON_CONTROL_DATABASE_URL elsewhere to use an
# external DB.
ironControl:
  enabled: false
  replicaCount: 1
  image:
    repository: ironsh/iron-control
    tag: latest
    pullPolicy: IfNotPresent
  railsEnv: production
  database:
    # Logical DB created on the bundled Postgres by the create-db init
    # container. Must match the primary connection's `database:` in the image's
    # database.yml — the connection URL carries no database path, so Rails
    # resolves the name from there.
    name: iron_control_production
  service:
    httpPort: 3000
  resources: {}

# Values for the upstream 1Password Connect subchart
# (https://github.com/1Password/connect-helm-charts/tree/main/charts/connect).
# Deployment is gated on onepasswordConnect.connect.create AND on
# ironProxy.secretSource == "onepassword-connect"; just up sets both when
# OP_CONNECT_CREDENTIALS_FILE is present. The credentials Secret itself is
# created externally by contrib/scripts/bootstrap-k8s-secrets.sh.
onepasswordConnect:
  connect:
    create: false
    credentialsName: centaur-onepassword-connect-credentials
    credentialsKey: 1password-credentials.json

secrets:
  bootstrapSecretName: ""

api:
  replicaCount: 1
  image:
    repository: centaur-api
    tag: latest
    pullPolicy: Always
  executionWorkerEnabled: false
  defaultHarness: codex
  # The API's worker claims workflow_runs and spawns a per-run sandbox to
  # execute each handler. Disable only if you're running your own claimer.
  workflowWorkerEnabled: true
  warmPoolEnabled: false
  pluginWatcherEnabled: false
  slackEtlEnabled: false
  slackSyncIntervalSeconds: 3600
  slackBackfillIntervalSeconds: 3600
  slackBackfillChannelBatchLimit: 20
  slackSyncBackfillLookbackDays: 30
  slackSyncThreadLookbackDays: 3
  googleDriveEtlEnabled: false
  googleDriveSyncIntervalSeconds: 14400
  googleCalendarEtlEnabled: false
  googleCalendarSyncIntervalSeconds: 14400
  companyContextDocumentsIntervalSeconds: 14400
  slackEtlExcludedChannelPatterns: ""
  victoriaMetricsPushEnabled: false
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 5
  egressDiscovery:
    enabled: true
    namespace: centaur-egress
    clusterDomain: cluster.local
    tailnetFqdnAnnotation: tailscale.com/tailnet-fqdn
  terminationGracePeriodSeconds: 35
  extraEnv: {}
  resources: {}

overlay:
  mountPath: /app/overlay/org
  systemPrompt: ""
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
    sourcePath: /overlay

sandbox:
  controller: pod
  image:
    repository: centaur-agent
    tag: latest
    pullPolicy: Always
  runtimeClassName: ""
  reposPath: ""
  extraEnv: {}
  stateVolume:
    enabled: false
    size: 10Gi
    storageClassName: ""
  resources:
    limits: {}
    requests:
      cpu: 100m
      memory: 512Mi

repoCache:
  enabled: false
  hostPath: /var/lib/centaur/repos
  repositories: []
  syncIntervalSeconds: 300
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  githubToken:
    existingSecretName: ""
    secretKey: token
    token: ""
  egressPorts:
    - 443
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

agentSandbox:
  enabled: false
  namespace:
    create: true
    name: agent-sandbox-system
  image:
    repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
    tag: v0.4.6
    pullPolicy: IfNotPresent
  controller:
    extensions: false

slackbot:
  enabled: true
  replicaCount: 1
  image:
    repository: centaur-slackbot
    tag: latest
    pullPolicy: Always
  runtimeErrorAlertChannel: ""
  extraEnv: {}
  resources: {}

chatbot:
  enabled: true
  replicaCount: 1
  image:
    repository: centaur-chatbot
    tag: latest
    pullPolicy: Always
  runtimeErrorAlertSpace: ""
  extraEnv: {}
  resources: {}

postgres:
  enabled: true
  image:
    repository: paradedb/paradedb
    tag: 0.23.0-pg16
    pullPolicy: IfNotPresent
  args:
    - "-c"
    - "shared_preload_libraries=pg_search,pg_cron"
  auth:
    database: ai_v2
    username: tempo
    password: tempo_dev_change_me
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""
    subPath: ""
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: centaur.local
  tls: []

httpRoutes: []

runnerAccess:
  enabled: false
  allowedCidrs: []
  apiService:
    type: LoadBalancer
    loadBalancerSourceRanges: []
  proxyService:
    type: LoadBalancer
    loadBalancerSourceRanges: []

networkPolicy:
  enabled: true
  ingressSourceNamespaces: []
  apiIngressSourceNamespaces: []
  ingressControllerNamespaces:
    - kube-system
  # Port the kubernetes.default ClusterIP forwards to for the API server. The
  # API needs egress to the control plane to manage sandboxes/proxies; under an
  # enforcing CNI the ClusterIP (:443) is DNAT'd to this real endpoint port, so
  # the egress rule must allow it. Defaults to 6443 (k3s, kubeadm). Set to 443
  # on clusters whose API server endpoint already listens on 443.
  apiServerPort: 6443

podSecurityContext:
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

laminar:
  enabled: false
  imagePullPolicy: IfNotPresent
  waitImage:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  frontend:
    image:
      repository: ghcr.io/lmnr-ai/frontend
      tag: latest
    service:
      port: 5667
    resources: {}
  appServer:
    image:
      repository: ghcr.io/lmnr-ai/app-server
      tag: latest
    service:
      httpPort: 8000
      grpcPort: 8001
      realtimePort: 8002
    resources: {}
  queryEngine:
    image:
      repository: ghcr.io/lmnr-ai/query-engine
      tag: latest
    service:
      port: 8903
    resources: {}
  quickwit:
    image:
      repository: quickwit/quickwit
      tag: v0.8.2
    service:
      httpPort: 7280
      grpcPort: 7281
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""
    resources: {}
  clickhouse:
    image:
      repository: clickhouse/clickhouse-server
      tag: latest
    service:
      httpPort: 8123
      nativePort: 9000
    auth:
      user: ch_user
      password: ch_passwd
      readOnlyUser: ch_user
      readOnlyPassword: ch_passwd
    persistence:
      enabled: true
      size: 20Gi
      storageClassName: ""
    resources: {}
  postgres:
    image:
      repository: postgres
      tag: "16"
    auth:
      username: postgres
      password: postgres_passwordabc
      database: postgres
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""
    resources: {}
  sharedSecretToken: some_secret
  nextAuthSecret: 0123456789abcdef0123456789abcdef
  aeadSecretKey: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  publicUrl: http://localhost:5667
  extraEnv: {}

