              value: {{ .Values.laminar.nextAuthSecret | quote }}
            - name: NEXT_PUBLIC_URL
              value: {{ .Values.laminar.publicUrl | quote }}
            - name: ENVIRONMENT
              value: LITE
            - name: CLICKHOUSE_URL
