apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-postgres") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "laminar-postgres") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-postgres") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-postgres") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.laminar.postgres.image.repository .Values.laminar.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.imagePullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.laminar.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.laminar.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.laminar.postgres.auth.password | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            tcpSocket:
              port: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
{{ toYaml .Values.laminar.postgres.resources | nindent 12 }}
  {{- if .Values.laminar.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.laminar.postgres.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.laminar.postgres.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-clickhouse") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-clickhouse") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: clickhouse
          image: {{ printf "%s:%s" .Values.laminar.clickhouse.image.repository .Values.laminar.clickhouse.image.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.imagePullPolicy }}
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.laminar.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.laminar.clickhouse.auth.password | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.laminar.clickhouse.service.httpPort }}
            - name: native
              containerPort: {{ .Values.laminar.clickhouse.service.nativePort }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.laminar.clickhouse.service.httpPort }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
            - name: config
              mountPath: /etc/clickhouse-server/users.d/lmnr.xml
              subPath: lmnr.xml
          resources:
{{ toYaml .Values.laminar.clickhouse.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse-config") }}
        - name: logs
          emptyDir: {}
  {{- if .Values.laminar.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.laminar.clickhouse.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.laminar.clickhouse.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-quickwit") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-quickwit") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "laminar-quickwit") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-quickwit") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-quickwit") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: quickwit
          image: {{ printf "%s:%s" .Values.laminar.quickwit.image.repository .Values.laminar.quickwit.image.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.imagePullPolicy }}
          command: ["quickwit"]
          args: ["run"]
          env:
            - name: QW_DATA_DIR
              value: /quickwit/qwdata
          ports:
            - name: http
              containerPort: {{ .Values.laminar.quickwit.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.laminar.quickwit.service.grpcPort }}
          readinessProbe:
            httpGet:
              path: /health/livez
              port: {{ .Values.laminar.quickwit.service.httpPort }}
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /quickwit/qwdata
          resources:
{{ toYaml .Values.laminar.quickwit.resources | nindent 12 }}
  {{- if .Values.laminar.quickwit.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.laminar.quickwit.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.laminar.quickwit.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-query-engine") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-query-engine") | nindent 4 }}
spec:
