          env:
            - name: DATABASE_URL
              value: {{ printf "postgres://%s:%s@%s:5432/%s" .Values.laminar.postgres.auth.username .Values.laminar.postgres.auth.password (include "centaur.componentName" (dict "root" . "component" "laminar-postgres")) .Values.laminar.postgres.auth.database | quote }}
            - name: PORT
              value: {{ .Values.laminar.frontend.service.port | quote }}
            - name: BACKEND_URL
