            - name: CLICKHOUSE_RO_PASSWORD
              value: {{ .Values.laminar.clickhouse.auth.readOnlyPassword | quote }}
            - name: AEAD_SECRET_KEY
              value: {{ .Values.laminar.aeadSecretKey | quote }}
            - name: QUICKWIT_SEARCH_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-quickwit")) .Values.laminar.quickwit.service.httpPort | quote }}
{{- range $name, $value := .Values.laminar.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
