{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
{{- if .Values.slackbot.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
{{- end }}
{{- if .Values.chatbot.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "chatbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "chatbot") | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "chatbot") | nindent 4 }}
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
{{- end }}
{{- if .Values.runnerAccess.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-runner") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.runnerAccess.apiService.type }}
  {{- with .Values.runnerAccess.apiService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | nindent 4 }}
  {{- end }}
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "iron-proxy-runner") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "iron-proxy") | nindent 4 }}
spec:
  type: {{ .Values.runnerAccess.proxyService.type }}
  {{- with .Values.runnerAccess.proxyService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | nindent 4 }}
  {{- end }}
  selector:
    centaur.ai/iron-proxy: "true"
    centaur.ai/sandbox-id: api
  ports:
    - name: proxy
      port: {{ .Values.ironProxy.service.proxyPort }}
      targetPort: {{ .Values.ironProxy.service.proxyPort }}
{{- end }}
