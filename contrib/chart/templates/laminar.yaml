            - name: BACKEND_RT_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-app-server")) .Values.laminar.appServer.service.realtimePort | quote }}
            - name: SHARED_SECRET_TOKEN
