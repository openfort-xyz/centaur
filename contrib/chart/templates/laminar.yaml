apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-app-server") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-app-server") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-app-server") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-app-server") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-laminar-dependencies
          image: {{ printf "%s:%s" .Values.laminar.waitImage.repository .Values.laminar.waitImage.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.waitImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              for target in \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-postgres") }}:5432 \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse") }}:{{ .Values.laminar.clickhouse.service.httpPort }} \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-quickwit") }}:{{ .Values.laminar.quickwit.service.httpPort }} \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-query-engine") }}:{{ .Values.laminar.queryEngine.service.port }}
              do
                host="${target%:*}"
                port="${target##*:}"
                until nc -z "$host" "$port"; do
                  sleep 2
                done
              done
      containers:
        - name: app-server
          image: {{ printf "%s:%s" .Values.laminar.appServer.image.repository .Values.laminar.appServer.image.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.imagePullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.laminar.appServer.service.httpPort | quote }}
            - name: GRPC_PORT
              value: {{ .Values.laminar.appServer.service.grpcPort | quote }}
            - name: DATABASE_URL
              value: {{ printf "postgres://%s:%s@%s:5432/%s" .Values.laminar.postgres.auth.username .Values.laminar.postgres.auth.password (include "centaur.componentName" (dict "root" . "component" "laminar-postgres")) .Values.laminar.postgres.auth.database | quote }}
            - name: SHARED_SECRET_TOKEN
              value: {{ .Values.laminar.sharedSecretToken | quote }}
            - name: CLICKHOUSE_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse")) .Values.laminar.clickhouse.service.httpPort | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.laminar.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.laminar.clickhouse.auth.password | quote }}
            - name: CLICKHOUSE_RO_USER
              value: {{ .Values.laminar.clickhouse.auth.readOnlyUser | quote }}
            - name: CLICKHOUSE_RO_PASSWORD
              value: {{ .Values.laminar.clickhouse.auth.readOnlyPassword | quote }}
            - name: ENVIRONMENT
              value: LITE
            - name: AEAD_SECRET_KEY
              value: {{ .Values.laminar.aeadSecretKey | quote }}
            - name: QUERY_ENGINE_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-query-engine")) .Values.laminar.queryEngine.service.port | quote }}
            - name: QUICKWIT_SEARCH_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-quickwit")) .Values.laminar.quickwit.service.httpPort | quote }}
            - name: QUICKWIT_INGEST_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "laminar-quickwit")) .Values.laminar.quickwit.service.grpcPort | quote }}
            - name: QUICKWIT_SPANS_INDEX_ID
              value: spans_v2
{{- range $name, $value := .Values.laminar.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.laminar.appServer.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.laminar.appServer.service.grpcPort }}
            - name: realtime
              containerPort: {{ .Values.laminar.appServer.service.realtimePort }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.laminar.appServer.service.httpPort }}
            failureThreshold: 30
          resources:
{{ toYaml .Values.laminar.appServer.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "laminar-frontend") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "laminar-frontend") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-frontend") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-frontend") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-laminar-dependencies
          image: {{ printf "%s:%s" .Values.laminar.waitImage.repository .Values.laminar.waitImage.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.waitImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              for target in \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-postgres") }}:5432 \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-clickhouse") }}:{{ .Values.laminar.clickhouse.service.httpPort }} \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-quickwit") }}:{{ .Values.laminar.quickwit.service.httpPort }} \
                {{ include "centaur.componentName" (dict "root" . "component" "laminar-app-server") }}:{{ .Values.laminar.appServer.service.httpPort }}
              do
                host="${target%:*}"
                port="${target##*:}"
