name: Build Fleet Images

# Builds the six deployable images and publishes them to
# ghcr.io/openfort-xyz/centaur/* with immutable sha-<sha> tags, for
# centaur-vps's deploy.sh --source ghcr (set CENTAUR_GHCR_NS to this
# namespace).
#
# This exists alongside centaur-vps's build-images.yml because that repo is
# reachable only by its read-only SSH deploy key — no available token can
# dispatch workflows there. This one lives in the fork, so the infra
# GITHUB_TOKEN can dispatch it, and every merge to main builds its own images
# automatically. The inherited publish-images.yml is not used: it depends on
# Depot builders this fork does not have.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Full git SHA to build (defaults to the ref the workflow runs on)"
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: build-fleet-images-${{ github.event.inputs.sha || github.sha }}
  cancel-in-progress: false

env:
  IMAGE_NS: ghcr.io/openfort-xyz/centaur

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pick.outputs.sha }}
    steps:
      - id: pick
        run: echo "sha=${{ github.event.inputs.sha || github.sha }}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
            dockerfile: services/api-rs/Dockerfile
            context: "."
          - image: centaur-iron-proxy
            dockerfile: services/iron-proxy/Dockerfile
            context: "."
          - image: centaur-agent
            dockerfile: services/sandbox/Dockerfile
            context: "."
            target: sandbox
          - image: centaur-googlechatbot
            dockerfile: services/googlechatbot/Dockerfile
            context: "."
          - image: centaur-slackbotv2
            dockerfile: services/slackbotv2/Dockerfile
            context: "."
          - image: centaur-console
            dockerfile: services/console/Dockerfile
            context: services/console
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NS }}/${{ matrix.image }}:sha-${{ needs.resolve.outputs.sha }}
            ${{ env.IMAGE_NS }}/${{ matrix.image }}:main
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  summary:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "## Built ${{ needs.resolve.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo 'Deploy with: `CENTAUR_GHCR_NS=ghcr.io/openfort-xyz/centaur ./deploy/deploy.sh --sha ${{ needs.resolve.outputs.sha }} --source ghcr`' >> "$GITHUB_STEP_SUMMARY"
          [ "${{ needs.build.result }}" = "success" ]
