      containers:
        - name: query-engine
          image: {{ printf "%s:%s" .Values.laminar.queryEngine.image.repository .Values.laminar.queryEngine.image.tag | quote }}
          imagePullPolicy: {{ .Values.laminar.imagePullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.laminar.queryEngine.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.laminar.queryEngine.service.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.laminar.queryEngine.service.port }}
